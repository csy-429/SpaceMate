<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SpaceMate - 결제 완료</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .success-animation { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes scaleIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1c1b1b", "background": "#fcf9f8", "border": "#E5E2ED",
                        "surface-container-lowest": "#ffffff", "surface-container-high": "#eae7e7",
                        "on-surface-variant": "#494456", "primary": "#540cd9", "brand-hover": "#5B2ED1",
                        "tertiary-container": "#007432", "on-tertiary-container": "#6afe8e", "outline": "#7a7487",
                        "surface-container-low": "#f6f3f2"
                    },
                    "spacing": { "stack-lg": "24px", "stack-xl": "48px", "margin-x": "24px", "stack-sm": "8px", "stack-md": "16px", "stack-xs": "4px" },
                    "fontFamily": { "headline-lg": ["Hanken Grotesk"], "headline-md": ["Hanken Grotesk"], "headline-sm": ["Hanken Grotesk"], "label-md": ["Hanken Grotesk"], "caption": ["Hanken Grotesk"], "body-md": ["Hanken Grotesk"] },
                    "fontSize": {
                        "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "headline-sm": ["17px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "label-md": ["15px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "caption": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<header class="bg-surface-container-lowest sticky top-0 z-50 shadow-sm border-b border-border">
<div class="flex flex-col w-full max-w-[1200px] mx-auto px-margin-x h-16 justify-center">
<div class="flex items-center justify-between">
<a class="font-headline-lg text-headline-lg font-black text-primary" href="index.html">SpaceMate</a>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-x py-stack-xl">
<div class="max-w-[600px] w-full flex flex-col items-center">
<div class="success-animation flex flex-col items-center mb-stack-xl">
<div class="w-24 h-24 bg-tertiary-container rounded-full flex items-center justify-center mb-stack-md">
<span class="material-symbols-outlined text-on-tertiary-container text-[48px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface text-center mb-stack-xs">예약이 완료되었습니다</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">결제가 성공적으로 처리되었습니다. 즐거운 시간 되세요!</p>
</div>
<div id="summary-card" class="w-full bg-surface-container-lowest border border-border rounded-xl shadow-sm p-stack-lg mb-stack-xl">
<p class="text-on-surface-variant text-center py-4">불러오는 중...</p>
</div>
<div class="flex flex-col sm:flex-row gap-stack-md w-full">
<a class="flex-1 h-12 flex items-center justify-center font-label-md text-label-md bg-surface-container-high text-on-surface-variant rounded-lg hover:bg-surface-container-highest transition-all active:scale-95" href="index.html">
홈으로
</a>
</div>
<p class="mt-stack-lg font-caption text-caption text-outline text-center">
문의사항이 있으시면 고객센터로 연락주세요.
</p>
</div>
</main>
<footer class="bg-surface-container-low border-t border-border">
<div class="max-w-[1200px] mx-auto px-margin-x py-stack-xl text-center text-caption text-on-surface-variant">
© SpaceMate Inc. All rights reserved.
</div>
</footer>
<script src="app.js"></script>
<script>
        function fmtDateLabel(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            return `${y}년 ${m}월 ${d}일`;
        }

        async function fetchSpaceItemDetail(item) {
            const res = await fetch(`${API_BASE}/reservations/${item.ref_id}`);
            if (!res.ok) return null;
            const reservation = await res.json();
            const spaceRes = await fetch(`${API_BASE}/spaces/${reservation.space_id}`);
            const space = (await spaceRes.json()).space;
            let timeLabel;
            if (reservation.reservation_type === 'package') {
                timeLabel = space.package_hours || '올나잇 패키지';
            } else {
                const end = (reservation.start_hour + reservation.hours) % 24;
                timeLabel = `${String(reservation.start_hour).padStart(2, '0')}:00 - ${String(end).padStart(2, '0')}:00 (${reservation.hours}시간)`;
            }
            return { item, reservation, space, timeLabel };
        }

        async function loadSummary() {
            const card = document.getElementById('summary-card');
            const raw = localStorage.getItem('spacemate_last_order');
            if (!raw) {
                card.innerHTML = '<p class="text-on-surface-variant text-center py-4">주문 정보를 찾을 수 없습니다. (새로고침하면 사라져요)</p>';
                return;
            }
            const order = JSON.parse(raw);
            try {
                const spaceItems = order.items.filter(i => i.item_type === 'space');
                const productItems = order.items.filter(i => i.item_type === 'product');
                const productsRes = await fetch(`${API_BASE}/products`);
                const allProducts = await productsRes.json();
                const spaceDetails = (await Promise.all(spaceItems.map(fetchSpaceItemDetail))).filter(Boolean);

                const headerHtml = spaceDetails.length ? `
                    <div class="flex gap-stack-md items-start">
                        <div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-cover bg-center" style="background-image: url('${spaceDetails[0].space.image_url}')"></div>
                        <div class="flex-grow">
                            <h2 class="font-headline-sm text-headline-sm text-on-surface">${spaceDetails[0].space.name}</h2>
                            <p class="font-body-md text-body-md text-on-surface-variant">${spaceDetails[0].space.region}</p>
                        </div>
                    </div>
                    <div class="h-[1px] bg-border w-full my-stack-md"></div>
                    <div class="grid grid-cols-2 gap-stack-md mb-stack-md">
                        <div class="flex flex-col">
                            <span class="font-caption text-caption text-outline">예약 날짜</span>
                            <span class="font-label-md text-label-md text-on-surface">${fmtDateLabel(spaceDetails[0].reservation.date)}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-caption text-caption text-outline">이용 시간</span>
                            <span class="font-label-md text-label-md text-on-surface">${spaceDetails[0].timeLabel}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-caption text-caption text-outline">인원</span>
                            <span class="font-label-md text-label-md text-on-surface">${spaceDetails[0].reservation.guest_count}명</span>
                        </div>
                    </div>` : '';

                const productListHtml = productItems.length ? `
                    <div class="h-[1px] bg-border w-full my-stack-md"></div>
                    <div class="space-y-2 mb-stack-md">
                        ${productItems.map(item => {
                            const p = allProducts.find(pr => pr.id === item.ref_id);
                            return p ? `<div class="flex justify-between text-body-md font-body-md text-on-surface-variant"><span>${p.name} x${item.quantity}</span><span>${(p.price * item.quantity).toLocaleString()}원</span></div>` : '';
                        }).join('')}
                    </div>` : '';

                card.innerHTML = `
                    ${headerHtml}
                    ${productListHtml}
                    <div class="h-[1px] bg-border w-full mb-stack-md"></div>
                    <div class="flex justify-between items-center">
                        <span class="font-headline-sm text-headline-sm text-on-surface">최종 결제 금액</span>
                        <span class="font-headline-lg text-headline-lg text-primary">${order.total_price.toLocaleString()}원</span>
                    </div>`;
            } catch (err) {
                console.error(err);
                card.innerHTML = '<p class="text-error text-center py-4">주문 상세를 불러오지 못했습니다.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadSummary);
    </script>
</body></html>
